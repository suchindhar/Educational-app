name: lawvexia
description: Constitutional Law Learning App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1

  # Supabase - 100% free backend
  supabase_flutter: ^2.5.0

  # UI & Animations
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  flutter_card_swiper: ^7.0.1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # File handling
  file_picker: ^8.0.3
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.2
  share_plus: ^9.0.0

  # Storage & State
  shared_preferences: ^2.2.2
  provider: ^6.1.1

  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0
  url_launcher: ^6.2.5
  flutter_svg: ^2.0.9
  percent_indicator: ^4.2.3
  flip_card: ^0.7.0
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/app_icon.png
    - assets/images/Flip and Learn.png
    - assets/images/Verdict_Call.png
    - assets/images/quiz.png
    - assets/images/match.png
